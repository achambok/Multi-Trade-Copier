# TRS Mosquitto — native macOS deployment (Homebrew)
# Replaces Docker-based eclipse-mosquitto:2
#
# Deploy:
#   cp mosquitto-native.conf /opt/homebrew/etc/mosquitto/mosquitto.conf
#   brew services start mosquitto
#
# Binds on all interfaces so the Windows VM can reach it at 172.16.21.1:1883

listener 1883 0.0.0.0
allow_anonymous true
persistence false
log_type all
log_dest stdout
